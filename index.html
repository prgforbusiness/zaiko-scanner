<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>バーコードスキャナー - ZAIKO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic Pro', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ---- ヘッダー ---- */
    #header {
      background: rgba(0,0,0,0.7);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    #close-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }
    #close-btn:active { background: rgba(255,255,255,0.3); }

    /* ---- カメラエリア ---- */
    #camera-wrap {
      position: relative;
      flex: 1;
      overflow: hidden;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ---- スキャン枠オーバーレイ ---- */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    /* 四隅のフレーム */
    #scan-frame {
      position: relative;
      width: min(70vw, 260px);
      height: min(70vw, 260px);
    }
    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #4caf50;
      border-style: solid;
    }
    .corner.tl { top: 0; left: 0;  border-width: 4px 0 0 4px; }
    .corner.tr { top: 0; right: 0; border-width: 4px 4px 0 0; }
    .corner.bl { bottom: 0; left: 0;  border-width: 0 0 4px 4px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 4px 4px 0; }

    /* スキャンライン */
    #scan-line {
      position: absolute;
      left: 4px;
      right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4caf50, transparent);
      animation: scan 2s ease-in-out infinite;
      top: 50%;
    }
    @keyframes scan {
      0%   { top: 8%;  opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 92%; opacity: 0; }
    }

    #overlay-hint {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      text-align: center;
      padding: 0 24px;
    }

    /* タップフォーカスリング */
    #focus-ring {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 2px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      display: none;
      transform: translate(-50%, -50%);
      animation: focusPulse 0.4s ease-out forwards;
    }
    @keyframes focusPulse {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }

    /* ---- ステータスメッセージ ---- */
    #status {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.75);
      padding: 12px 16px;
      font-size: 13px;
      text-align: center;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #status.success { background: rgba(30,120,30,0.9); font-weight: 600; font-size: 15px; }
    #status.error   { background: rgba(160,30,30,0.9); }

    /* ---- 手動入力エリア ---- */
    #manual-area {
      background: rgba(0,0,0,0.85);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #manual-input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      padding: 8px 12px;
      outline: none;
      -webkit-appearance: none;
    }
    #manual-input::placeholder { color: rgba(255,255,255,0.4); }
    #manual-input:focus { border-color: #4caf50; }
    #manual-btn {
      background: #4caf50;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
    }
    #manual-btn:active { background: #388e3c; }

    /* ---- 初期ローディング ---- */
    #loading {
      position: absolute;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 5;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #4caf50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div id="header">
    <h1>バーコードスキャナー <span style="font-size:11px;font-weight:400;opacity:0.6;">ver.2-0</span></h1>
    <div style="display:flex;gap:8px;align-items:center;">
      <button id="torch-btn" onclick="toggleTorch()" style="display:none;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer;line-height:1;" title="ライト">&#x1F526;</button>
      <button id="close-btn" onclick="closeScanner()">閉じる</button>
    </div>
  </div>

  <!-- カメラエリア -->
  <div id="camera-wrap">
    <!-- 初期ローディング -->
    <div id="loading">
      <div class="spinner"></div>
      <div style="font-size:14px;color:rgba(255,255,255,0.7)">カメラを起動しています...</div>
    </div>

    <video id="video" autoplay playsinline muted></video>

    <!-- タップフォーカスリング -->
    <div id="focus-ring"></div>

    <!-- スキャン枠オーバーレイ -->
    <div id="overlay">
      <div id="scan-frame">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div id="scan-line"></div>
      </div>
      <p id="overlay-hint">バーコードを枠内に合わせてください<br><span style="font-size:11px;opacity:0.7;">ぼやける場合は画面をタップ</span></p>
    </div>

    <!-- ステータス -->
    <div id="status">カメラを起動中...</div>
  </div>

  <!-- 手動入力 -->
  <div id="manual-area">
    <input type="text" id="manual-input" placeholder="バーコードを手動入力" inputmode="numeric">
    <button id="manual-btn" onclick="sendManual()">送信</button>
  </div>

  <!-- ZXingライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script>
    var reader        = null;   // ZXing fallback
    var detected      = false;
    var _videoTrack   = null;
    var _rafId        = null;   // video フレームスキャン用 rAF
    var _scanTimer    = null;   // スチル撮影スキャン用タイマー
    var _detector     = null;   // BarcodeDetector インスタンス
    var _imageCapture = null;   // ImageCapture（スチル撮影でフォーカスを効かせる）
    var _torchOn      = false;  // ライト状態
    var _refocusTimer = null;   // 定期リフォーカス用タイマー

    // ---- 連続確認カウンタ（誤読み防止） ----
    var _lastRawCode    = '';
    var _confirmCount   = 0;
    var _CONFIRM_NEEDED = 2;
    var _lastScanTime   = 0;
    var _SCAN_INTERVAL  = 150;

    // ---- 結果をGASアプリに返す ----
    function sendBarcode(code) {
      if (detected) return;
      detected = true;

      setStatus('検出: ' + code, 'success');

      // 振動フィードバック（スマホ）
      if (navigator.vibrate) navigator.vibrate(150);

      // GASアプリ（opener）にpostMessageで送信
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'ZAIKO_BARCODE', code: code }, '*');
        setTimeout(function() { window.close(); }, 800);
      } else {
        // 直接開いた場合（テスト用）: URLパラメータ経由でリダイレクト
        var returnUrl = getReturnUrl();
        if (returnUrl) {
          setTimeout(function() {
            window.location.href = returnUrl + (returnUrl.includes('?') ? '&' : '?') + 'barcode=' + encodeURIComponent(code);
          }, 800);
        } else {
          setStatus('読み取り完了: ' + code + '\n（このウィンドウを閉じてください）', 'success');
        }
      }
    }

    // URLパラメータからリダイレクト先を取得
    function getReturnUrl() {
      var params = new URLSearchParams(window.location.search);
      return params.get('return');
    }

    function closeScanner() {
      stopCamera();
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'ZAIKO_SCANNER_CLOSED' }, '*');
      }
      window.close();
    }

    // ---- ステータス表示 ----
    function setStatus(msg, type) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = type || '';
    }

    // ---- カメラ停止 ----
    function stopCamera() {
      if (_refocusTimer) { clearInterval(_refocusTimer); _refocusTimer = null; }
      if (_scanTimer)    { clearTimeout(_scanTimer);     _scanTimer    = null; }
      if (_torchOn && _videoTrack) {
        try { _videoTrack.applyConstraints({ advanced: [{ torch: false }] }); } catch(e) {}
        _torchOn = false;
      }
      _videoTrack   = null;
      _detector     = null;
      _imageCapture = null;
      if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
      if (reader) {
        try { reader.reset(); } catch(e) {}
        reader = null;
      }
      var video = document.getElementById('video');
      if (video && video.srcObject) {
        video.srcObject.getTracks().forEach(function(t) { t.stop(); });
        video.srcObject = null;
      }
    }

    // ---- ライト（トーチ）トグル ----
    function toggleTorch() {
      if (!_videoTrack) return;
      var caps = _videoTrack.getCapabilities ? _videoTrack.getCapabilities() : {};
      if (!caps.torch) return;
      _torchOn = !_torchOn;
      _videoTrack.applyConstraints({ advanced: [{ torch: _torchOn }] }).then(function() {
        var btn = document.getElementById('torch-btn');
        btn.style.background = _torchOn ? 'rgba(255,220,0,0.5)' : 'rgba(255,255,255,0.15)';
        // ON→OFF の瞬間にカメラがリフォーカスする機種が多い
        if (!_torchOn) triggerSingleShotFocus();
      }).catch(function() {});
    }

    // ---- single-shot フォーカスを1回発火してから continuous に戻す ----
    function triggerSingleShotFocus() {
      if (!_videoTrack) return;
      var caps = _videoTrack.getCapabilities ? _videoTrack.getCapabilities() : {};
      if (caps.focusMode && caps.focusMode.includes('single-shot')) {
        _videoTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] })
          .then(function() {
            if (caps.focusMode.includes('continuous')) {
              setTimeout(function() {
                _videoTrack && _videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(function() {});
              }, 400);
            }
          }).catch(function() {});
      } else if (caps.focusMode && caps.focusMode.includes('continuous')) {
        _videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(function() {});
      }
    }

    // ---- 定期自動リフォーカス（2.5秒ごと） ----
    function startAutoRefocus() {
      if (_refocusTimer) clearInterval(_refocusTimer);
      _refocusTimer = setInterval(function() {
        if (!_videoTrack || detected) return;
        triggerSingleShotFocus();
      }, 2500);
    }

    // ---- トーチボタンを表示（対応している場合のみ） ----
    function showTorchButtonIfSupported() {
      if (!_videoTrack) return;
      var caps = _videoTrack.getCapabilities ? _videoTrack.getCapabilities() : {};
      if (caps.torch) {
        document.getElementById('torch-btn').style.display = 'block';
      }
    }

    // ---- オートフォーカス適用（ZXing fallback 用） ----
    function applyAutofocus(track) {
      if (!track || !track.getCapabilities) return;
      var caps = track.getCapabilities();
      if (caps.focusMode && caps.focusMode.includes('continuous')) {
        track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(function() {});
      }
    }

    // ---- タップでフォーカス再調整 ----
    document.getElementById('camera-wrap').addEventListener('click', function(e) {
      var ring = document.getElementById('focus-ring');
      ring.style.left = e.clientX + 'px';
      ring.style.top  = e.clientY + 'px';
      ring.style.display = 'block';
      ring.style.animation = 'none';
      ring.offsetWidth; // reflow
      ring.style.animation = '';
      setTimeout(function() { ring.style.display = 'none'; }, 500);
      triggerSingleShotFocus();
    });

    // ---- エラー表示ヘルパー ----
    function handleCameraError(err) {
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        setStatus('カメラへのアクセスが拒否されました。ブラウザの設定でカメラを許可してください', 'error');
      } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
        setStatus('カメラが見つかりません', 'error');
      } else if (err.name === 'NotReadableError') {
        setStatus('カメラが他のアプリに使用中です', 'error');
      } else {
        setStatus('カメラを起動できませんでした: ' + (err.message || err.name), 'error');
      }
    }

    // ---- カメラ起動（振り分け） ----
    function startScanner() {
      var video = document.getElementById('video');

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        hideLoading();
        setStatus('このブラウザはカメラに対応していません', 'error');
        return;
      }

      if ('BarcodeDetector' in window) {
        startNativePath(video);
      } else {
        startZxingPath(video);
      }
    }

    // ================================================================
    // ネイティブ BarcodeDetector パス（Android Chrome 83+）
    // OS標準のMLKitを使うのでフォーカスが自動で合う
    // ================================================================
    function startNativePath(video) {
      navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width:  { ideal: 1280 },
          height: { ideal: 720 }
        }
      }).then(function(stream) {
        _videoTrack = stream.getVideoTracks()[0] || null;
        video.srcObject = stream;

        // ImageCapture が使える場合はスチル撮影モードでフォーカスを解決
        if (_videoTrack && window.ImageCapture) {
          try { _imageCapture = new ImageCapture(_videoTrack); } catch(e) {}
        }

        return new Promise(function(resolve) {
          video.onloadedmetadata = resolve;
        });
      }).then(function() {
        return video.play();
      }).then(function() {
        return BarcodeDetector.getSupportedFormats();
      }).then(function(formats) {
        _detector = new BarcodeDetector({ formats: formats });
        hideLoading();
        showTorchButtonIfSupported();
        if (_imageCapture) {
          // ★ スチル撮影モード: takePhoto() がシャッターごとにAFを効かせる
          setStatus('スキャン待機中 [スチル]... バーコードを枠内に合わせてください');
          schedulePhotoScan();
        } else {
          // フォールバック: video フレーム解析
          setStatus('スキャン待機中 [ネイティブ]... バーコードを枠内に');
          triggerSingleShotFocus();
          startAutoRefocus();
          scheduleNativeScan(video);
        }
      }).catch(function(err) {
        if (err.name === 'NotAllowedError' || err.name === 'NotFoundError' || err.name === 'NotReadableError') {
          hideLoading();
          handleCameraError(err);
        } else {
          try {
            _detector = new BarcodeDetector();
            hideLoading();
            showTorchButtonIfSupported();
            if (_imageCapture) {
              setStatus('スキャン待機中 [スチル]... バーコードを枠内に合わせてください');
              schedulePhotoScan();
            } else {
              setStatus('スキャン待機中 [ネイティブ]... バーコードを枠内に');
              triggerSingleShotFocus();
              startAutoRefocus();
              scheduleNativeScan(video);
            }
          } catch(e) {
            hideLoading();
            setStatus('バーコード検出を起動できませんでした', 'error');
          }
        }
      });
    }

    // ================================================================
    // スチル撮影スキャン（ImageCapture.takePhoto() でAFを強制適用）
    // ================================================================
    function schedulePhotoScan() {
      if (detected || !_imageCapture || !_detector) return;
      _imageCapture.takePhoto().then(function(blob) {
        return createImageBitmap(blob);
      }).then(function(bitmap) {
        // 検出後すぐに bitmap を解放してメモリを節約
        return _detector.detect(bitmap).then(function(codes) {
          bitmap.close();
          return codes;
        }, function(err) {
          bitmap.close();
          throw err;
        });
      }).then(function(codes) {
        if (detected) return;
        if (codes.length > 0) {
          var code = codes[0].rawValue;
          if (code === _lastRawCode) {
            _confirmCount++;
            if (_confirmCount >= _CONFIRM_NEEDED) {
              sendBarcode(code);
              return;
            }
          } else {
            _lastRawCode  = code;
            _confirmCount = 1;
          }
        } else {
          _lastRawCode  = '';
          _confirmCount = 0;
        }
        _scanTimer = setTimeout(schedulePhotoScan, 300);
      }).catch(function() {
        if (!detected) _scanTimer = setTimeout(schedulePhotoScan, 500);
      });
    }

    function scheduleNativeScan(video) {
      _rafId = requestAnimationFrame(function(timestamp) {
        if (detected) return;

        // スキャン間隔を制限（ブレたフレームを拾いにくくする）
        if (timestamp - _lastScanTime < _SCAN_INTERVAL) {
          scheduleNativeScan(video);
          return;
        }
        _lastScanTime = timestamp;

        _detector.detect(video).then(function(codes) {
          if (codes.length > 0) {
            var code = codes[0].rawValue;
            if (code === _lastRawCode) {
              // 同じコードが連続検出 → カウントアップ
              _confirmCount++;
              if (_confirmCount >= _CONFIRM_NEEDED) {
                sendBarcode(code);
                return;
              }
            } else {
              // 異なるコード → カウンタリセット
              _lastRawCode  = code;
              _confirmCount = 1;
            }
          } else {
            // 何も検出されなかったらカウンタリセット
            _lastRawCode  = '';
            _confirmCount = 0;
          }
          scheduleNativeScan(video);
        }).catch(function() {
          scheduleNativeScan(video);
        });
      });
    }

    // ================================================================
    // ZXing フォールバックパス（iOS Safari / Firefox など）
    // ================================================================
    function startZxingPath(video) {
      if (typeof ZXing === 'undefined' || !ZXing.BrowserMultiFormatReader) {
        hideLoading();
        setStatus('スキャナーライブラリが読み込めませんでした', 'error');
        return;
      }

      reader = new ZXing.BrowserMultiFormatReader();
      reader.decodeFromConstraints(
        {
          video: {
            facingMode: { ideal: 'environment' },
            width:  { ideal: 1280 },
            height: { ideal: 720 }
          }
        },
        video,
        function(result, err) {
          if (result) sendBarcode(result.getText());
          // err は毎フレーム発生するので無視
        }
      ).then(function() {
        hideLoading();
        setStatus('スキャン待機中 [ZXing]... ぼやける場合は画面をタップ');
        if (video.srcObject) {
          _videoTrack = video.srcObject.getVideoTracks()[0] || null;
          applyAutofocus(_videoTrack);
          triggerSingleShotFocus();
          startAutoRefocus();
          showTorchButtonIfSupported();
        }
      }).catch(function(err) {
        hideLoading();
        handleCameraError(err);
      });
    }

    function hideLoading() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    }

    // ---- 手動入力 ----
    function sendManual() {
      var val = document.getElementById('manual-input').value.trim();
      if (!val) return;
      sendBarcode(val);
    }

    document.getElementById('manual-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendManual();
    });

    // ページを閉じるとき（ブラウザバックなど）にカメラを停止
    window.addEventListener('beforeunload', stopCamera);

    // ---- スキャン開始 ----
    window.addEventListener('DOMContentLoaded', function() {
      if ('BarcodeDetector' in window) {
        // ネイティブAPIが使えるので ZXing 不要 → 即時起動
        startScanner();
      } else if (typeof ZXing !== 'undefined') {
        // ZXing がすでに読み込まれている
        startScanner();
      } else {
        // ZXing CDN の読み込みを待つ（最大 8 秒）
        var interval = setInterval(function() {
          if (typeof ZXing !== 'undefined') {
            clearInterval(interval);
            startScanner();
          }
        }, 200);
        setTimeout(function() {
          clearInterval(interval);
          if (!detected) {
            hideLoading();
            setStatus('ライブラリの読み込みに失敗しました。通信環境を確認してください', 'error');
          }
        }, 8000);
      }
    });
  </script>
</body>
</html>
