<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>バーコードスキャナー - ZAIKO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic Pro', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ---- ヘッダー ---- */
    #header {
      background: rgba(0,0,0,0.4);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #header h1 { font-size: 15px; font-weight: 600; }
    #close-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
    }
    #close-btn:active { background: rgba(255,255,255,0.3); }

    /* ---- メインエリア ---- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 24px;
      text-align: center;
    }

    #scan-icon { font-size: 80px; line-height: 1; }

    #instructions {
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      line-height: 1.7;
    }
    #instructions .hint {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.6;
    }

    /* ---- スキャンボタン ---- */
    #scan-btn {
      background: #4caf50;
      border: none;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 18px 0;
      border-radius: 40px;
      cursor: pointer;
      width: 100%;
      max-width: 340px;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 20px rgba(76,175,80,0.45);
      transition: transform 0.1s, background 0.15s;
    }
    #scan-btn:active  { background: #388e3c; transform: scale(0.97); }
    #scan-btn:disabled { opacity: 0.55; pointer-events: none; }

    /* ---- ステータス ---- */
    #status {
      width: 100%;
      max-width: 360px;
      min-height: 52px;
      font-size: 14px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      text-align: center;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    #status.info    { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75); }
    #status.success { background: rgba(30,120,30,0.85); font-weight: 700; font-size: 16px; }
    #status.error   { background: rgba(180,40,40,0.75); }
    #status.scanning { background: rgba(33,150,243,0.25); }

    /* ---- 手動入力エリア ---- */
    #manual-area {
      background: rgba(0,0,0,0.35);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #manual-input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      padding: 9px 12px;
      outline: none;
      -webkit-appearance: none;
    }
    #manual-input::placeholder { color: rgba(255,255,255,0.35); }
    #manual-input:focus { border-color: #4caf50; }
    #manual-btn {
      background: #4caf50;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 18px;
      cursor: pointer;
      white-space: nowrap;
    }
    #manual-btn:active { background: #388e3c; }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <div id="header">
    <h1>バーコードスキャナー <span style="font-size:11px;font-weight:400;opacity:0.55;">ver.3-0</span></h1>
    <button id="close-btn" onclick="closeScanner()">閉じる</button>
  </div>

  <!-- メイン -->
  <div id="main">
    <div id="scan-icon">&#x1F4F7;</div>

    <p id="instructions">
      バーコード・QRコードを撮影して読み取ります
      <span class="hint">バーコード部分だけを画面いっぱいに写すと認識しやすくなります</span>
    </p>

    <!-- ネイティブカメラ起動用（capture="environment" でOSカメラが開く） -->
    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none">

    <button id="scan-btn" onclick="openCamera()">&#x1F4F7;&nbsp;&nbsp;カメラで読み取る</button>

    <div id="status" class="info">カメラボタンを押してバーコードを撮影してください</div>
  </div>

  <!-- 手動入力 -->
  <div id="manual-area">
    <input type="text" id="manual-input" placeholder="バーコードを手動入力" inputmode="numeric">
    <button id="manual-btn" onclick="sendManual()">送信</button>
  </div>

  <!-- ZXing（BarcodeDetector 非対応環境のフォールバック） -->
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script>
    var _detector = null;

    // ---- BarcodeDetector を初期化（対応環境のみ） ----
    window.addEventListener('DOMContentLoaded', function() {
      if ('BarcodeDetector' in window) {
        BarcodeDetector.getSupportedFormats().then(function(formats) {
          _detector = new BarcodeDetector({ formats: formats });
        }).catch(function() {
          try { _detector = new BarcodeDetector(); } catch(e) {}
        });
      }
    });

    // ---- ネイティブカメラを開く ----
    function openCamera() {
      document.getElementById('photo-input').click();
    }

    document.getElementById('photo-input').addEventListener('change', function(e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;
      e.target.value = ''; // 同じファイルで再試行できるようリセット
      analyzePhoto(file);
    });

    // ---- 写真を解析 ----
    function analyzePhoto(file) {
      setBtnState(true, '解析中...');
      setStatus('読み取り中...', 'scanning');

      if (_detector) {
        // BarcodeDetector で解析
        createImageBitmap(file).then(function(bitmap) {
          return _detector.detect(bitmap).then(function(codes) {
            bitmap.close();
            return codes;
          }, function(err) {
            bitmap.close();
            throw err;
          });
        }).then(function(codes) {
          setBtnState(false);
          if (codes && codes.length > 0) {
            sendBarcode(codes[0].rawValue);
          } else {
            setStatus('バーコードが見つかりませんでした\nバーコード部分だけを大きく撮影して再試行してください', 'error');
          }
        }).catch(function() {
          setBtnState(false);
          setStatus('解析に失敗しました。再度お試しください', 'error');
        });

      } else if (typeof ZXing !== 'undefined' && ZXing.BrowserMultiFormatReader) {
        // ZXing フォールバック
        var url = URL.createObjectURL(file);
        new ZXing.BrowserMultiFormatReader()
          .decodeFromImageUrl(url)
          .then(function(result) {
            URL.revokeObjectURL(url);
            setBtnState(false);
            sendBarcode(result.getText());
          })
          .catch(function() {
            URL.revokeObjectURL(url);
            setBtnState(false);
            setStatus('バーコードが見つかりませんでした\nバーコード部分だけを大きく撮影して再試行してください', 'error');
          });

      } else {
        setBtnState(false);
        setStatus('スキャナーが初期化されていません。ページを再読み込みしてください', 'error');
      }
    }

    // ---- ボタン状態管理 ----
    function setBtnState(disabled, label) {
      var btn = document.getElementById('scan-btn');
      btn.disabled = !!disabled;
      btn.innerHTML = disabled
        ? (label || '解析中...')
        : '&#x1F4F7;&nbsp;&nbsp;カメラで読み取る';
    }

    // ---- 結果をGASアプリに返す ----
    function sendBarcode(code) {
      setStatus('検出: ' + code, 'success');
      if (navigator.vibrate) navigator.vibrate(150);

      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'ZAIKO_BARCODE', code: code }, '*');
        setTimeout(function() { window.close(); }, 1000);
      } else {
        var returnUrl = new URLSearchParams(window.location.search).get('return');
        if (returnUrl) {
          setTimeout(function() {
            window.location.href = returnUrl +
              (returnUrl.includes('?') ? '&' : '?') +
              'barcode=' + encodeURIComponent(code);
          }, 1000);
        }
      }
    }

    function closeScanner() {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'ZAIKO_SCANNER_CLOSED' }, '*');
      }
      window.close();
    }

    function setStatus(msg, type) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = type || 'info';
    }

    // ---- 手動入力 ----
    function sendManual() {
      var val = document.getElementById('manual-input').value.trim();
      if (!val) return;
      sendBarcode(val);
    }

    document.getElementById('manual-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendManual();
    });
  </script>
</body>
</html>
